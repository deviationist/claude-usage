name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install zsh + jq
        run: sudo apt-get update && sudo apt-get install -y zsh jq
      - name: Syntax check
        run: zsh -n claude-usage.zsh
      - name: Run tests
        run: zsh test/run.zsh
